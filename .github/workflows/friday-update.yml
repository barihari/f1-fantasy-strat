name: Friday Update

on:
  schedule:
    - cron: '0 13 * * 5'  # 9am ET (UTC-4 during EDT)
  workflow_dispatch: {}

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Send Friday Update
        run: |
          curl -X POST "${{ secrets.VERCEL_APP_URL }}/api/reminder?type=friday" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --max-time 120
