name: Tuesday Reminder

on:
  schedule:
    - cron: '0 13 * * 2'  # 9am ET (UTC-4 during EDT)
  workflow_dispatch: {}

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Tuesday Reminder
        run: |
          curl -X POST "${{ secrets.VERCEL_APP_URL }}/api/reminder?type=tuesday" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --max-time 120
